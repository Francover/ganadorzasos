<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Valores Growth Team</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <div id="scene-1" class="scene active">
        <div class="background top-bg"></div>

        <div class="drop-zone-visual">
            <div class="drop-icon">📜</div>
            <span>Pon aquí el pergamino</span>
        </div>
        
        <img src="assets/mesa.png" class="mesa" alt="Escritorio de oficina">
        
        <div class="physics-object pergamino" data-valor="data" style="filter: hue-rotate(0deg);">
            <img src="assets/pergaminos.png" alt="Data Driven">
        </div>
        <div class="physics-object pergamino" data-valor="agility" style="filter: hue-rotate(90deg);">
            <img src="assets/pergaminos.png" alt="Agility">
        </div>
        <div class="physics-object pergamino" data-valor="impact" style="filter: hue-rotate(180deg);">
            <img src="assets/pergaminos.png" alt="Impact">
        </div>
        <div class="physics-object pergamino" data-valor="truth" style="filter: hue-rotate(270deg);">
            <img src="assets/pergaminos.png" alt="Candor">
        </div>
		<div class="physics-object pergamino" data-valor="ownership" style="filter: hue-rotate(330deg);">
            <img src="assets/pergaminos.png" alt="Ownership">
        </div>

        <button id="btn-reiniciar" class="nav-btn image-btn top-right" aria-label="Reiniciar">Reiniciar</button>
        <button id="btn-boom" class="nav-btn image-btn bottom-right " aria-label="Boom">Boom</button>
        <button id="btn-conocenos" class="nav-btn image-btn middle-right" aria-label="Conocenos">Conocenos</button>
    </div>

    <div id="scene-2" class="scene" style="display: none;">
        <div class="background top-bg" style="background-image: url('assets/escene2.png');"></div>

        <div class="drop-zone-visual">

            <span>Pon aquí el objeto</span>
        </div>
        
        <img src="assets/mesa.png" class="mesa" alt="Mesa de cafetería">
        
        <div class="physics-object manzana" data-valor="valor1" data-emoji="🍎" data-objeto="manzana roja">
            <img src="assets/calavera.png" alt="Objeto 1">
        </div>
        <div class="physics-object manzana" data-valor="valor2" data-emoji="🍏" data-objeto="manzana verde">
            <img src="assets/manzana.png" alt="Objeto 2">
        </div>
        <div class="physics-object manzana" data-valor="valor3" data-emoji="🧚🏻‍♀️" data-objeto="hada">
            <img src="assets/hada.png" alt="Objeto 3">
        </div>
        <div class="physics-object manzana" data-valor="valor4" data-emoji="🧔🏻‍♂️" data-objeto="gerson">
            <img src="assets/gerson.png" alt="Objeto 4">
        </div>
        <div class="physics-object manzana" data-valor="valor5" data-emoji="🌷" data-objeto="flor">
            <img src="assets/flor.png" alt="Objeto 5">
        </div>
        <div class="physics-object manzana" data-valor="valor6" data-emoji="🪖" data-objeto="casco">
            <img src="assets/casco.png" alt="Objeto 6">
        </div>
        <div class="physics-object manzana" data-valor="valor7" data-emoji="👨🏻‍🍳" data-objeto="chef">
            <img src="assets/chef.png" alt="Objeto 7">
        </div>
        <button id="btn-reiniciar-s2" class="nav-btn image-btn top-right" aria-label="Reiniciar">Reiniciar</button>
        <button id="btn-boom-s2" class="nav-btn image-btn bottom-right" aria-label="Boom">Boom</button>
        <button id="btn-volver" class="nav-btn image-btn middle-right" aria-label="Volver">Volver</button>
    </div>

    <div id="modal-mensaje" class="modal hidden">
        <div id="modal-caja-dinamica" class="modal-content anime-scroll">
            <div class="modal-header">
                <h3 id="modal-titulo">TÍTULO</h3>
            </div>
            <div class="modal-body">
                <p id="modal-texto">Descripción del valor.</p>
            </div>
            <button id="btn-cerrar-modal" class="btn-primary">ENTENDIDO ✔</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
